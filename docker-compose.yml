version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xclusive_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - xclusive_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5  

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: xclusive_server
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      CLIENT_URL: ${CLIENT_URL}
      COMPANY_NAME: "Xclusive Interiors Pvt. Ltd."
      COMPANY_ADDRESS: "208, Vision Galleria, Near Kunal Icon, Pimple Saudagar, Pune 411027"
      COMPANY_GSTIN: "27AAACX1884C1ZD"
    volumes:
      - ./server/uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
       postgres:
        condition: service_healthy
    networks:
      - xclusive_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: xclusive_client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - xclusive_net

volumes:
  postgres_data:

networks:
  xclusive_net:
    driver: bridge
